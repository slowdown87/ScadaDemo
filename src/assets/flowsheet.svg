<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="tankGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a3f5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2535;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00aaff;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#00ffee;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00aaff;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="reactorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a4f6f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a3f5f;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="alarmGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00aaff"/>
    </marker>
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#36d399"/>
    </marker>
    <marker id="arrowheadRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff4757"/>
    </marker>
  </defs>

  <style>
    .flow-animation {
      stroke-dasharray: 20, 10;
      animation: flow 1s linear infinite;
    }
    @keyframes flow {
      from { stroke-dashoffset: 30; }
      to { stroke-dashoffset: 0; }
    }
    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .tank-liquid {
      transition: height 0.5s ease-in-out;
    }
    .running { fill: #36d399; }
    .stopped { fill: #4a5568; }
    .alarm { fill: #ff4757; }
  </style>

  <!-- 背景网格 -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1a2535" stroke-width="0.5"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 标题 -->
  <text x="600" y="40" text-anchor="middle" fill="#00aaff" font-size="24" font-weight="bold" font-family="Arial, sans-serif">
    智能工业控制系统 - 工艺流程图
  </text>

  <!-- ===== 原料罐A ===== -->
  <g id="tankA" transform="translate(80, 200)">
    <ellipse cx="60" cy="0" rx="50" ry="15" fill="#3a4f6f" stroke="#00aaff" stroke-width="2"/>
    <rect x="10" y="0" width="100" height="120" fill="url(#tankGrad)" stroke="#00aaff" stroke-width="2"/>
    <ellipse cx="60" cy="120" rx="50" ry="15" fill="#2a3f5f" stroke="#00aaff" stroke-width="2"/>
    <rect x="10" y="20" width="100" height="80" fill="#00aaff" opacity="0.3" class="tank-liquid"/>
    <text x="60" y="60" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">原料罐A</text>
    <text x="60" y="80" text-anchor="middle" fill="#00aaff" font-size="12" class="tank-level">液位: 50%</text>
    <!-- 液位报警指示 -->
    <circle cx="110" cy="30" r="8" fill="#4a5568" class="alarm-indicator"/>
  </g>

  <!-- ===== 调节阀1 ===== -->
  <g id="valve1" transform="translate(260, 250)">
    <rect x="0" y="0" width="40" height="40" fill="#2a3f5f" stroke="#00aaff" stroke-width="2" rx="5"/>
    <circle cx="20" cy="20" r="12" fill="#1a2535" stroke="#00aaff" stroke-width="2"/>
    <line x1="20" y1="8" x2="20" y2="32" stroke="#00aaff" stroke-width="3"/>
    <text x="20" y="55" text-anchor="middle" fill="#00aaff" font-size="11">调节阀1</text>
    <text x="20" y="70" text-anchor="middle" fill="#36d399" font-size="10" class="flow-rate">流量: 10L/s</text>
  </g>

  <!-- ===== 混合器 ===== -->
  <g id="mixer" transform="translate(400, 200)">
    <rect x="0" y="0" width="100" height="100" fill="url(#reactorGrad)" stroke="#00aaff" stroke-width="2" rx="10"/>
    <circle cx="50" cy="50" r="30" fill="#1a2535" stroke="#00aaff" stroke-width="2"/>
    <line x1="50" y1="20" x2="50" y2="80" stroke="#00aaff" stroke-width="2" class="mixer-blade"/>
    <line x1="20" y1="50" x2="80" y2="50" stroke="#00aaff" stroke-width="2" class="mixer-blade"/>
    <text x="50" y="115" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">混合器</text>
    <text x="50" y="135" text-anchor="middle" fill="#00aaff" font-size="10">温度: 25°C</text>
  </g>

  <!-- ===== 反应釜 ===== -->
  <g id="reactor" transform="translate(580, 160)">
    <ellipse cx="80" cy="30" rx="60" ry="20" fill="#3a4f6f" stroke="#00aaff" stroke-width="2"/>
    <rect x="20" y="30" width="120" height="140" fill="url(#reactorGrad)" stroke="#00aaff" stroke-width="2"/>
    <ellipse cx="80" cy="170" rx="60" ry="20" fill="#2a3f5f" stroke="#00aaff" stroke-width="2"/>
    <rect x="20" y="80" width="120" height="60" fill="#00aaff" opacity="0.2" class="tank-liquid"/>
    <text x="80" y="100" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">反应釜</text>
    <text x="80" y="220" text-anchor="middle" fill="#00aaff" font-size="11" class="reactor-temp">温度: 25°C</text>
    <text x="80" y="240" text-anchor="middle" fill="#00aaff" font-size="11" class="reactor-pressure">压力: 1.0atm</text>
    <!-- 搅拌电机 -->
    <g transform="translate(80, -10)">
      <rect x="-20" y="-25" width="40" height="25" fill="#2a3f5f" stroke="#00aaff" stroke-width="2" rx="3"/>
      <text x="0" y="-8" text-anchor="middle" fill="#36d399" font-size="10" class="motor-status">电机: 0RPM</text>
    </g>
  </g>

  <!-- ===== 分离器 ===== -->
  <g id="separator" transform="translate(780, 180)">
    <rect x="0" y="0" width="100" height="120" fill="url(#reactorGrad)" stroke="#00aaff" stroke-width="2" rx="5"/>
    <line x1="0" y1="60" x2="100" y2="60" stroke="#00aaff" stroke-width="2" stroke-dasharray="5,5"/>
    <circle cx="50" cy="30" r="15" fill="#1a2535" stroke="#00aaff" stroke-width="2"/>
    <circle cx="50" cy="90" r="15" fill="#1a2535" stroke="#00aaff" stroke-width="2"/>
    <text x="50" y="140" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">分离器</text>
    <text x="50" y="160" text-anchor="middle" fill="#00aaff" font-size="10">液位: 50%</text>
  </g>

  <!-- ===== 成品罐 ===== -->
  <g id="productTank" transform="translate(960, 200)">
    <ellipse cx="60" cy="0" rx="50" ry="15" fill="#3a4f6f" stroke="#00aaff" stroke-width="2"/>
    <rect x="10" y="0" width="100" height="120" fill="url(#tankGrad)" stroke="#00aaff" stroke-width="2"/>
    <ellipse cx="60" cy="120" rx="50" ry="15" fill="#2a3f5f" stroke="#00aaff" stroke-width="2"/>
    <rect x="10" y="30" width="100" height="70" fill="#36d399" opacity="0.3" class="tank-liquid"/>
    <text x="60" y="60" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">成品罐</text>
    <text x="60" y="80" text-anchor="middle" fill="#36d399" font-size="12" class="product-count">产量: 0</text>
    <text x="60" y="100" text-anchor="middle" fill="#36d399" font-size="10">液位: 30%</text>
  </g>

  <!-- ===== 管道连接 ===== -->
  <!-- 原料罐A -> 调节阀1 -->
  <path d="M 140 260 L 260 270" stroke="url(#pipeGrad)" stroke-width="6" fill="none" marker-end="url(#arrowhead)" class="flow-animation"/>
  <!-- 调节阀1 -> 混合器 -->
  <path d="M 300 270 L 400 250" stroke="url(#pipeGrad)" stroke-width="6" fill="none" marker-end="url(#arrowhead)" class="flow-animation"/>
  <!-- 混合器 -> 反应釜 -->
  <path d="M 500 250 L 580 230" stroke="url(#pipeGrad)" stroke-width="6" fill="none" marker-end="url(#arrowhead)" class="flow-animation"/>
  <!-- 反应釜 -> 分离器 -->
  <path d="M 720 230 L 780 240" stroke="url(#pipeGrad)" stroke-width="6" fill="none" marker-end="url(#arrowhead)" class="flow-animation"/>
  <!-- 分离器 -> 成品罐 -->
  <path d="M 880 240 L 960 260" stroke="url(#pipeGrad)" stroke-width="6" fill="none" marker-end="url(#arrowheadGreen)" class="flow-animation"/>

  <!-- ===== 侧线管道 ===== -->
  <!-- 原料罐A 出口管线 -->
  <path d="M 140 260 L 140 300 L 200 300" stroke="#4a5568" stroke-width="4" fill="none"/>

  <!-- ===== 控制按钮区域 ===== -->
  <g id="controls" transform="translate(100, 450)">
    <rect x="0" y="0" width="1000" height="180" fill="#121826" stroke="#00aaff" stroke-width="2" rx="10"/>
    <text x="500" y="30" text-anchor="middle" fill="#00aaff" font-size="16" font-weight="bold">控制面板</text>

    <!-- 启动按钮 -->
    <g transform="translate(100, 60)">
      <rect x="0" y="0" width="120" height="50" fill="#36d399" stroke="#2ecc71" stroke-width="2" rx="25" class="start-btn"/>
      <text x="60" y="32" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">▶ 启动</text>
    </g>

    <!-- 停止按钮 -->
    <g transform="translate(280, 60)">
      <rect x="0" y="0" width="120" height="50" fill="#ff4757" stroke="#e74c3c" stroke-width="2" rx="25" class="stop-btn"/>
      <text x="60" y="32" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">■ 停止</text>
    </g>

    <!-- 复位按钮 -->
    <g transform="translate(460, 60)">
      <rect x="0" y="0" width="120" height="50" fill="#00aaff" stroke="#3498db" stroke-width="2" rx="25" class="reset-btn"/>
      <text x="60" y="32" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">↻ 复位</text>
    </g>

    <!-- 数据面板 -->
    <g transform="translate(650, 50)">
      <rect x="0" y="0" width="320" height="120" fill="#1a2535" stroke="#00aaff" stroke-width="1" rx="5"/>
      <text x="160" y="25" text-anchor="middle" fill="#00aaff" font-size="12" font-weight="bold">实时数据</text>
      <line x1="10" y1="40" x2="310" y2="40" stroke="#00aaff" stroke-width="0.5" opacity="0.3"/>

      <text x="20" y="65" fill="#36d399" font-size="11">液位: <tspan class="data-tank">50%</tspan></text>
      <text x="170" y="65" fill="#36d399" font-size="11">流量: <tspan class="data-flow">0 L/s</tspan></text>

      <text x="20" y="90" fill="#f39c12" font-size="11">温度: <tspan class="data-temp">25.0°C</tspan></text>
      <text x="170" y="90" fill="#f39c12" font-size="11">压力: <tspan class="data-pressure">1.0 atm</tspan></text>

      <text x="20" y="115" fill="#00aaff" font-size="11">电机: <tspan class="data-motor">0 RPM</tspan></text>
      <text x="170" y="115" fill="#00aaff" font-size="11">产量: <tspan class="data-product">0</tspan></text>
    </g>
  </g>

  <!-- ===== 报警指示区域 ===== -->
  <g id="alarms" transform="translate(80, 650)">
    <rect x="0" y="0" width="1040" height="40" fill="#1a0a0a" stroke="#ff4757" stroke-width="1" rx="5" opacity="0"/>
    <circle cx="20" cy="20" r="8" fill="#4a5568" class="global-alarm-indicator"/>
    <text x="40" y="25" fill="#888" font-size="12" class="alarm-text">系统正常</text>
  </g>

  <!-- 状态指示灯 -->
  <g transform="translate(1050, 80)">
    <text x="0" y="0" fill="#00aaff" font-size="12">状态:</text>
    <circle cx="60" cy="-5" r="10" fill="#36d399" class="status-led"/>
    <text x="80" y="0" fill="#36d399" font-size="12" class="status-text">运行</text>
  </g>
</svg>
