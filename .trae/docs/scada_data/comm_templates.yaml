    - device: "HMI-02"
      ip: "192.168.1.21"
      mask: "255.255.255.0"
      gateway: "192.168.1.1"

  plcs:
    - device: "PLC-1"
      ip: "192.168.1.11"
      mask: "255.255.255.0"
      gateway: "192.168.1.1"
    - device: "PLC-2"
      ip: "192.168.1.12"
      mask: "255.255.255.0"
      gateway: "192.168.1.1"
    - device: "PLC-3"
      ip: "192.168.1.13"
      mask: "255.255.255.0"
      gateway: "192.168.1.1"

  instruments:
    - device: "电能表EM-WT01"
      ip: "192.168.1.31"
      mask: "255.255.255.0"
      gateway: "192.168.1.1"
    - device: "电能表EM-EX01"
      ip: "192.168.1.32"
      mask: "255.255.255.0"
      gateway: "192.168.1.1"
    - device: "电能表EM-UH01"
      ip: "192.168.1.33"
      mask: "255.255.255.0"
      gateway: "192.168.1.1"
    - device: "电能表EM-PF01"
      ip: "192.168.1.34"
      mask: "255.255.255.0"
      gateway: "192.168.1.1"
    - device: "电能表EM-PK01"
      ip: "192.168.1.35"
      mask: "255.255.255.0"
      gateway: "192.168.1.1"
    - device: "电能表EM-Total"
      ip: "192.168.1.36"
      mask: "255.255.255.0"
      gateway: "192.168.1.1"

  third_party:
    - device: "贴标机"
      ip: "192.168.1.51"
      mask: "255.255.255.0"
      gateway: "192.168.1.1"
    - device: "喷码机"
      ip: "192.168.1.52"
      mask: "255.255.255.0"
      gateway: "192.168.1.1"

# ============================================================================
# 串口配置
# ============================================================================
serial_ports:
  - port: "COM1"
    usage: "瓶盖计数器"
    baudrate: 9600
    databits: 8
    parity: "N"
    stopbits: 1
  - port: "COM2"
    usage: "pH计(HART)"
    baudrate: 9600
    databits: 8
    parity: "N"
    stopbits: 1
  - port: "COM3"
    usage: "预留"
    baudrate: "-"
    databits: "-"
    parity: "-"
    stopbits: "-"

# ============================================================================
# 端口汇总
# ============================================================================
port_summary:
  - port: 4840
    protocol: "OPC UA"
    usage: "MES系统对接"
  - port: 502
    protocol: "Modbus TCP"
    usage: "电能表、能源系统"
  - port: 5000
    protocol: "TCP"
    usage: "贴标机"
  - port: 2000
    protocol: "TCP"
    usage: "喷码机"

# ============================================================================
# 通讯诊断配置
# ============================================================================
comm_diagnostics:
  plc_comm:
    method: "心跳检测"
    alarm: "3次无响应"
    action: "标记故障，切换备用PLC"

  modbus_rtu:
    method: "响应超时"
    alarm: "3秒无响应"
    action: "标记设备故障，继续轮询"

  modbus_tcp:
    method: "连接检测"
    alarm: "连接断开"
    action: "尝试重连，5次后报警"

  opc_ua:
    method: "会话状态"
    alarm: "会话中断"
    action: "通知MES，重建连接"

# ============================================================================
# 故障记录格式
# ============================================================================
fault_log_format:
  - field: "故障时间"
    format: "YYYY-MM-DD HH:mm:ss"
  - field: "设备名称"
    format: "故障设备位号"
  - field: "故障类型"
    format: "通讯超时/CRC错误/设备忙"
  - field: "故障次数"
    format: "连续故障次数"
  - field: "自动恢复"
    format: "是否自动恢复"
  - field: "恢复时间"
    format: "如自动恢复，记录恢复时间"
