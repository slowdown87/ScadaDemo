# ============================================================================
# 验收标准
# ============================================================================
acceptance_standards:
  sensory:
    - parameter: "外观"
      standard: "清澈透明，无悬浮物"
      method: "目视"
    - parameter: "色泽"
      standard: "符合各产品特征色"
      method: "目视"
    - parameter: "气味"
      standard: "无异味，具有茶香"
      method: "感官评定"

  physical:
    - parameter: "Brix"
      unit: "°Brix"
      standard: "10±1.0"
      method: "在线糖度计"
    - parameter: "pH"
      unit: "-"
      standard: "5.5±0.5"
      method: "在线pH计"
    - parameter: "温度"
      unit: "℃"
      standard: "25±5"
      method: "温度传感器"

  chemical:
    - parameter: "茶多酚"
      unit: "mg/kg"
      standard: "≥300(绿茶)/≥150(红茶)/≥200(乌龙茶)"
      method: "GB/T 8313"
    - parameter: "电导率"
      unit: "μS/cm"
      standard: "<50"
      method: "在线电导率仪"

  microbiological:
    - parameter: "菌落总数"
      unit: "CFU/mL"
      standard: "<100"
      method: "GB 4789.2"
    - parameter: "大肠菌群"
      unit: "CFU/mL"
      standard: "<3"
      method: "GB 4789.3"
    - parameter: "商业无菌"
      unit: "-"
      standard: "阴性"
      method: "GB/T 4789.26"

