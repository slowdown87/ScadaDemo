# ============================================================================
# 设备分类模板
# ============================================================================
device_types:
  tank:
    name: "储罐/容器"
    has_level_sensor: true
    has_temp_sensor: true
    standard_sensors: ["LT", "TT"]
    valves: []
    pumps: []
    motors: []

  pump:
    name: "输送泵"
    has_status: true
    has_running_status: true
    standard_sensors: ["DT"]
    valves: []
    pumps: []
    motors: []

  motor:
    name: "电机/搅拌"
    has_status: true
    has_temp_sensor: true
    has_speed_sensor: false
    standard_sensors: ["DT", "MT"]
    valves: []
    pumps: []
    motors: []

  valve:
    name: "阀门"
    has_status: true
    has_open_feedback: true
    has_close_feedback: true
    standard_sensors: ["DT"]
    valves: []
    pumps: []
    motors: []

  heat_exchanger:
    name: "换热器/冷却器"
    has_temp_sensor: true
    has_pressure_sensor: true
    standard_sensors: ["TT", "PT"]
    valves: []
    pumps: []
    motors: []

  filter:
    name: "过滤器/超滤"
    has_pressure_sensor: true
    has_diff_pressure: true
    has_flow_sensor: true
    standard_sensors: ["PT", "DPT", "FT"]
    valves: []
    pumps: []
    motors: []

  uht:
    name: "UHT杀菌锅"
    has_multi_temp: true
    has_pressure_sensor: true
    has_flow_sensor: true
    standard_sensors: ["TT1", "TT2", "TT3", "TT4", "TT5", "PT1", "PT2", "FT"]
    valves: []
    pumps: []
    motors: []

  filler:
    name: "灌装机"
    has_speed_sensor: true
    has_temp_sensor: true
    has_pressure_sensor: true
    has_flow_sensor: true
    standard_sensors: ["ST", "TT", "PT", "FT", "LT"]
    valves: []
    pumps: []
    motors: []

  packaging:
    name: "包装设备"
    has_speed_sensor: true
    has_status: true
    standard_sensors: ["ST", "DT"]
    valves: []
    pumps: []
    motors: []

